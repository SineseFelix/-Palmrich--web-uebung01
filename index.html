<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Startseite</title>
</head>

<body style="background-color: lightblue;">

    <h1>Felix Palmrich – 6R</h1>

    <h2>Persönliche Daten</h2>

    <p>
        Geburtsdatum: 12.08.2009 <br>
        Lieblingsfarbe: Schwarz
    </p>

    <h2>Meine Lieblingsfächer</h2>

    <ol>
        <li>Informatik</li>
        <li>Sport</li>
        <li>Mathematik</li>
    </ol>

    <h2>Meine Hobbys</h2>

    <ul id="liste-hobbys"></ul>

    <h2>Freies Bild</h2>

    <figure>
        <img src="images(1).jpg" alt="Mein Bild" width="300">
        <figcaption>Rickroll</figcaption>
    </figure>


    <script>
        const hobbys = ["Gaming", "Schwimmen", "Programmieren", "Felix Palmrich"];

        const liste = document.getElementById("liste-hobbys");

        hobbys.forEach(h => {
            let li = document.createElement("li");
            li.textContent = h;
            liste.appendChild(li);
        });
    </script>

</body>
</html>
